<!-- 弹窗样式与脚本开始 -->
<style>
  #popupOverlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    padding: 10px;
    box-sizing: border-box;
  }
  
  #popupOverlay.show {
    display: flex;
  }
  
  .popup-content {
    background: #fff;
    padding: 20px 30px;
    border-radius: 12px;
    max-width: 100%;
    width: 370px;
    text-align: center;
    position: relative;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
    box-sizing: border-box;
    max-height: 90vh;
    overflow-y: auto;
  }
  
  .popup-close-btn {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.05);
    border: none;
    font-size: 20px;
    font-weight: bold;
    color: #999;
    cursor: pointer;
    transition: all 0.3s;
    flex-shrink: 0;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 10;
  }
  
  .popup-close-btn:hover {
    background: #f44336;
    color: #fff;
  }
  
  .popup-link {
    text-decoration: none;
    color: inherit;
    display: block;
  }
  
  .popup-title {
    margin: 0 0 10px;
    font-size: 24px;
    font-weight: bold;
    color: #ff4d4f;
    word-wrap: break-word;
  }
  
  .popup-image {
    width: 100%;
    max-width: 300px;
    height: auto;
    display: block;
    margin: 0 auto 15px;
    border-radius: 8px;
  }

  .popup-shop-btn {
    display: inline-block;
    width: 100%;
    background: #e11d48;
    color: #fff;
    font-weight: bold;
    padding: 12px 16px;
    border-radius: 8px;
    text-decoration: none;
    transition: background 0.3s;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  }

  .popup-shop-btn:hover {
    background: #be123c;
  }
  
  /* 移动端适配 */
  @media (max-width: 768px) {
    .popup-content {
      width: 95%;
      max-width: 320px;
      padding: 15px 20px;
    }
    
    .popup-title {
      font-size: 20px;
    }
    
    .popup-close-btn {
      width: 28px;
      height: 28px;
      font-size: 18px;
    }
  }
</style>
<div id="popupOverlay" class="popup-overlay" aria-label="推荐广告">
    <div class="popup-content">
      <div class="popup-stack">
        <a href="https://xn--9kqs58iq4c.com/" target="_blank" rel="sponsored noopener" class="popup-link">
          <p class="popup-title">Clash 机场推荐</p>
          <img src="https://free.picui.cn/free/2026/06/05/6a229370bf0c1.png" alt="机场地址" class="popup-image">
        </a>
        <div class="popup-shop-wrap">
          <a href="https://xn--9kqs58iq4c.com/" target="_blank" rel="sponsored noopener" class="popup-shop-btn">
            加速器下载
          </a>
        </div>
      </div>
      <button class="1" id="2" type="button" aria-label="关闭">&times;</button>
    </div>
  </div>

  <script src="/assets/js/main.js?v=20260612103910"></script>
<article class="article-detail">
  <div class="container article-container">
    <nav class="breadcrumb-row">
      <a href="$home_url">首页</a>
      <span>/</span>
      <a href="$articles_url">使用文章</a>
    </nav>
    <header class="article-header">
      <div class="article-meta">
        <span class="article-category">$category</span>
        <span class="article-date">$date</span>
        <span class="article-author">$author</span>
      </div>
      <h1 class="article-title">$article_title</h1>
      <p class="article-description">$article_description</p>
    </header>
    <figure class="article-banner">
      <img src="$article_image" alt="$article_image_alt" class="article-image">
      <figcaption class="article-image-caption">$article_image_caption</figcaption>
    </figure>
    <div class="article-body">
      $article_body
    </div>
    <footer class="article-footer">
      <div class="tag-list">$tag_html</div>
      <p class="verification-note">$notice</p>
      <div class="verification-stamp">信息更新于 $date</div>
    </footer>
  </div>
</article>

<aside class="related-links section">
  <div class="container">
    <h2 class="section-title">相关阅读</h2>
    <div class="side-links">
      $related_links
    </div>
  </div>
</aside>

<section class="article-faq section">
  <div class="container">
    <h2 class="section-title">常见问题</h2>
    <div class="faq-list">
      $faq_html
    </div>
  </div>
</section>

<nav class="article-nav">
  <div class="container">
    <a href="$home_url" class="btn btn-secondary">返回首页</a>
    <a href="$articles_url" class="btn btn-secondary">所有文章</a>
  </div>
</nav>
